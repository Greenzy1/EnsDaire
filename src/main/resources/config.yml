settings:
  language: tr_TR

messages:
  prefix: "&8[&bEnsDaire&8] &r"

game:
  min-players: 2
  max-players: 16
  countdown-time: 20
  round-duration: 60
  round-end-delay: 5
  capsule-release-delay: 3
  slow-fall-duration: 60
  spawn-protection: 3
  win-fireworks: true
  circle-check-interval: 2

territory:
  center-size: 7
  safe-blocks:
    - "IRON_BLOCK"
    - "QUARTZ_BLOCK"
    - "SHULKER_BOX"
    - "WHITE_CONCRETE"

shulker:
  spawn-height-offset: 0
  items-per-shulker: 3
  loot:
    IRON_SWORD: 50
    GOLDEN_APPLE: 30
    BOW: 40
    ARROW: 80
    ENDER_PEARL: 20
    SHIELD: 30

tokens:
  kill: 10
  first-blood: 15
  survive-round: 5
  win: 50
  top3-bonus: 20

points:
  kill: 5
  first-blood: 10
  survive-round: 2
  win: 25
  top3-bonus: 10

actionbar:
  enabled: true

effects:
  elimination-effect: true

bossbar:
  color: BLUE
  style: SOLID

scoreboard:
  enabled: true
  title: "&b&l✦ EnsDaire ✦"
  update-interval: 10
  footer: "&7ensis.net"

sounds:
  countdown: "BLOCK_NOTE_BLOCK_PLING"
  round-start: "ENTITY_EXPERIENCE_ORB_PICKUP"
  win: "UI_TOAST_CHALLENGE_COMPLETE"
  elimination: "ENTITY_PLAYER_DEATH"
  shulker-open: "ENTITY_SHULKER_OPEN"

ranks:
  - name: "Çaylak"
    prefix: "&7[Çaylak]"
    token-requirement: 0
  - name: "Amatör"
    prefix: "&a[Amatör]"
    token-requirement: 500
  - name: "Uzman"
    prefix: "&e[Uzman]"
    token-requirement: 2000
  - name: "Efsane"
    prefix: "&6[Efsane]"
    token-requirement: 10000
